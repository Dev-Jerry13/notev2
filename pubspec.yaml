name: samsung_notes
description: A premium note-taking app inspired by Samsung Notes
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.0.0-dev.3
  riverpod_annotation: ^3.0.0-dev.3

  # Local Storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Rich Text Editor
  flutter_quill: ^11.5.0

  # File & Media
  file_picker: ^10.3.10
  image_picker: ^1.1.2
  path_provider: ^2.1.3
  path: ^1.9.0

  # Animations
  animations: ^2.0.11
  flutter_animate: ^4.5.0

  # PDF Export
  pdf: ^3.11.1
  printing: ^5.13.1

  # Utilities
  uuid: ^4.4.0
  intl: ^0.20.2
  share_plus: ^12.0.2
  flutter_local_notifications: ^21.0.0
  crypto: ^3.0.3
  collection: ^1.18.0
  flutter_staggered_grid_view: ^0.7.0
  cached_network_image: ^3.3.1
  lottie: ^3.1.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.11
  riverpod_generator: ^3.0.0-dev.11

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/icons/
